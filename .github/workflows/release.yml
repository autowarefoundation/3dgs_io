name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Get merged PR and check for release label
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_json=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq '.[0] // empty' 2>/dev/null || true)
          if [ -z "$pr_json" ]; then
            echo "No PR associated with this push — skipping release"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          labels=$(echo "$pr_json" | jq -r '[.labels[].name] | join(",")')
          bump=none
          count=0
          for lvl in major minor patch; do
            if echo ",$labels," | grep -q ",release:${lvl},"; then
              bump=$lvl
              count=$((count + 1))
            fi
          done
          if [ "$count" -gt 1 ]; then
            echo "::error::Multiple release labels found — pick exactly one"
            exit 1
          fi
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "Resolved bump level: ${bump}"

      - uses: actions/checkout@v4
        if: steps.pr.outputs.bump != 'none'
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        if: steps.pr.outputs.bump != 'none'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.pr.outputs.bump != 'none'
        run: uv python install

      - name: Bump version
        if: steps.pr.outputs.bump != 'none'
        id: bump
        run: |
          set -euo pipefail
          uv version --bump "${{ steps.pr.outputs.bump }}"
          next=$(uv version --short)
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${next} (${{ steps.pr.outputs.bump }})"

      - name: Fail if tag already exists
        if: steps.pr.outputs.bump != 'none'
        run: |
          if git rev-parse "refs/tags/${{ steps.bump.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.bump.outputs.tag }} already exists" >&2
            exit 1
          fi

      - name: Configure git
        if: steps.pr.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag, and push
        if: steps.pr.outputs.bump != 'none'
        id: commit
        run: |
          set -euo pipefail
          git add pyproject.toml uv.lock
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "HEAD:main"
          git push origin "${{ steps.bump.outputs.tag }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build package
        if: steps.pr.outputs.bump != 'none'
        run: uv build

      - name: Create GitHub Release
        if: steps.pr.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --target "${{ steps.commit.outputs.sha }}" \
            --generate-notes \
            dist/*
